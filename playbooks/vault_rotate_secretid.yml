---
- name: "Stage 3.2 — HashiCorp Vault SecretID Rotation"
  hosts: vault
  become: true
  gather_facts: false
  vars_files:
    - "{{ playbook_dir }}/../inventory/group_vars/vault_inventory.yml"
  vars:
    target_service: "" # Can be passed as -e "target_service=jenkins"
  tasks:
    - name: Validate target service argument
      ansible.builtin.fail:
        msg: "Please specify a valid target_service (jenkins, gitea, harbor, authentik) using -e 'target_service=...'"
      when: target_service not in ['jenkins', 'gitea', 'harbor', 'authentik']

    - name: Ensure local runtime/vault directory exists
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../runtime/vault"
        state: directory
        mode: '0700'
      delegate_to: localhost
      become: false

    - name: Check local init.json existence to load root token
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../runtime/vault/init.json"
      register: local_init_file
      delegate_to: localhost
      become: false

    - name: Fail if Vault is not initialized
      ansible.builtin.fail:
        msg: "Vault init.json not found! Please run playbooks/vault.yml first to initialize Vault."
      when: not local_init_file.stat.exists

    - name: Load local Vault keys
      ansible.builtin.set_fact:
        vault_keys: "{{ lookup('file', playbook_dir + '/../runtime/vault/init.json') | from_json }}"
      delegate_to: localhost
      become: false

    - name: Check if local AppRoles file exists
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../runtime/vault/approles.json"
      register: local_approles_file
      delegate_to: localhost
      become: false

    - name: Load local AppRoles file
      ansible.builtin.set_fact:
        local_approles: "{{ lookup('file', playbook_dir + '/../runtime/vault/approles.json') | from_json }}"
      when: local_approles_file.stat.exists
      delegate_to: localhost
      become: false

    - name: Initialize local AppRoles fact if missing
      ansible.builtin.set_fact:
        local_approles: {}
      when: not local_approles_file.stat.exists

    - name: Verify Vault is unsealed
      ansible.builtin.command: vault status -format=json
      environment:
        VAULT_ADDR: "https://127.0.0.1:{{ vault_api_port }}"
        VAULT_CACERT: "{{ vault_cert_dir }}/vault.crt"
      register: vault_status_raw
      failed_when: false
      changed_when: false

    - name: Validate Vault status response
      ansible.builtin.assert:
        that:
          - vault_status_raw.stdout is defined
          - vault_status_raw.stdout | trim != ''
          - (vault_status_raw.stdout | from_json).initialized is defined
        fail_msg: >
          Vault is not responding correctly or returned invalid JSON.
          Command RC: {{ vault_status_raw.rc }}
          Command Error: {{ vault_status_raw.stderr }}

    - name: Unseal Vault if sealed
      ansible.builtin.command: "vault operator unseal {{ item }}"
      environment:
        VAULT_ADDR: "https://127.0.0.1:{{ vault_api_port }}"
        VAULT_CACERT: "{{ vault_cert_dir }}/vault.crt"
      loop: "{{ vault_keys.unseal_keys_b64[:3] }}"
      when: (vault_status_raw.stdout | from_json).sealed | bool

    - name: Generate new SecretID for target service
      ansible.builtin.command: "vault write -f -field=secret_id auth/approle/role/{{ target_service }}/secret-id"
      environment:
        VAULT_ADDR: "https://127.0.0.1:{{ vault_api_port }}"
        VAULT_CACERT: "{{ vault_cert_dir }}/vault.crt"
        VAULT_TOKEN: "{{ vault_keys.root_token }}"
      register: rotated_secret_id

    - name: Retrieve RoleID for target service
      ansible.builtin.command: "vault read -field=role_id auth/approle/role/{{ target_service }}/role-id"
      environment:
        VAULT_ADDR: "https://127.0.0.1:{{ vault_api_port }}"
        VAULT_CACERT: "{{ vault_cert_dir }}/vault.crt"
        VAULT_TOKEN: "{{ vault_keys.root_token }}"
      register: service_role_id
      changed_when: false

    - name: Update local AppRole credentials dictionary
      ansible.builtin.set_fact:
        updated_approles: "{{ local_approles | combine({ target_service: { 'role_id': service_role_id.stdout, 'secret_id': rotated_secret_id.stdout } }) }}"

    - name: Save updated AppRoles file locally
      ansible.builtin.copy:
        content: "{{ updated_approles | to_nice_json }}"
        dest: "{{ playbook_dir }}/../runtime/vault/approles.json"
        mode: '0600'
      delegate_to: localhost
      become: false

    - name: Print Rotated Credentials Details
      ansible.builtin.debug:
        msg:
          - "========================================="
          - "SecretID rotated successfully for service: {{ target_service }}"
          - "RoleID: {{ service_role_id.stdout }}"
          - "New SecretID: {{ rotated_secret_id.stdout }}"
          - "Local file updated: runtime/vault/approles.json"
          - "========================================="
