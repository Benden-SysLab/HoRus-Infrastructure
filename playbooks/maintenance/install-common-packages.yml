---
- name: "Operational: Install Common Packages"
  hosts: all
  become: true
  gather_facts: true
  vars_files:
    - "{{ playbook_dir }}/../../inventory/group_vars/vault_inventory.yml"
  tasks:
    - name: Run Package Installation task from common role
      ansible.builtin.include_role:
        name: common
        tasks_from: packages
