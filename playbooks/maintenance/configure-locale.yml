---
- name: "Operational: Configure Locale and Timezone"
  hosts: all
  become: true
  gather_facts: true
  vars_files:
    - "{{ playbook_dir }}/../../inventory/group_vars/vault_inventory.yml"
  tasks:
    - name: Run Locale task
      ansible.builtin.include_role:
        name: common
        tasks_from: locale
