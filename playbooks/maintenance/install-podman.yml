---
- name: "Operational: Install Podman and Container Tools"
  hosts: all
  become: true
  gather_facts: true
  tasks:
    - name: Load container package definitions
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../../roles/common/vars/packages/containers.yml"

    - name: Install container packages on standard hosts
      ansible.builtin.apt:
        name: "{{ container_packages }}"
        state: present
      when: node_class | default('vm') != 'proxmox'
