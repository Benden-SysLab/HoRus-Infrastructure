---
- name: "Operational: Install Certificates and Security Packages"
  hosts: all
  become: true
  gather_facts: true
  tasks:
    - name: Load security package definitions
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../../roles/common/vars/packages/security.yml"

    - name: Install security packages on standard hosts
      ansible.builtin.apt:
        name: "{{ security_packages }}"
        state: present
      when: node_class | default('vm') != 'proxmox'
