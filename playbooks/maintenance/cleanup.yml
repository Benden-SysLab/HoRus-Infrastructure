---
- name: "Operational: Infrastructure Clean-up"
  hosts: all
  become: true
  gather_facts: true
  tasks:
    - name: Autoclean APT packages
      ansible.builtin.apt:
        autoclean: yes
      when: node_class | default('vm') != 'proxmox'

    - name: Autoremove APT dependencies
      ansible.builtin.apt:
        autoremove: yes
      when: node_class | default('vm') != 'proxmox'

    - name: Clear local cache of retrieved package files
      ansible.builtin.apt:
        clean: yes
      when: node_class | default('vm') != 'proxmox'
