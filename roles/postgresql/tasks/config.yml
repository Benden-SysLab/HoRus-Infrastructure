---
- name: Check if database files already exist in the mount
  ansible.builtin.stat:
    path: "/var/lib/postgresql/{{ postgresql_version }}/main/PG_VERSION"
  register: pg_version_stat

- name: Check if PostgreSQL config file exists
  ansible.builtin.stat:
    path: "/etc/postgresql/{{ postgresql_version }}/main/postgresql.conf"
  register: pg_config_stat

- name: Initialize PostgreSQL cluster database structure manually (handling nested mounts)
  block:
    - name: Create temporary initialization directory
      ansible.builtin.file:
        path: /tmp/pg_init
        state: directory
        owner: postgres
        group: postgres
        mode: '0700'

    - name: Run initdb on temporary directory
      ansible.builtin.command:
        cmd: "/usr/lib/postgresql/{{ postgresql_version }}/bin/initdb -D /tmp/pg_init --auth-local peer --auth-host scram-sha-256 --no-instructions --data-checksums"
      become: true
      become_user: postgres

    - name: Ensure target directory exists and is owned by postgres
      ansible.builtin.file:
        path: "/var/lib/postgresql/{{ postgresql_version }}/main"
        state: directory
        owner: postgres
        group: postgres
        mode: '0700'
      when: not pg_version_stat.stat.exists

    - name: Ensure target nested pg_wal directory is owned by postgres
      ansible.builtin.file:
        path: "/var/lib/postgresql/{{ postgresql_version }}/main/pg_wal"
        state: directory
        owner: postgres
        group: postgres
        mode: '0700'
      when: not pg_version_stat.stat.exists

    - name: Copy initialized database files (excluding WAL) to target mount
      ansible.builtin.shell: |
        rsync -a --exclude=pg_wal /tmp/pg_init/ /var/lib/postgresql/{{ postgresql_version }}/main/
      become: true
      when: not pg_version_stat.stat.exists

    - name: Copy WAL files to nested SSD mount
      ansible.builtin.shell: |
        rsync -a /tmp/pg_init/pg_wal/ /var/lib/postgresql/{{ postgresql_version }}/main/pg_wal/
      become: true
      when: not pg_version_stat.stat.exists

    - name: Create PostgreSQL main cluster configuration directory
      ansible.builtin.file:
        path: "/etc/postgresql/{{ postgresql_version }}/main"
        state: directory
        owner: postgres
        group: postgres
        mode: '0755'

    - name: Copy default configuration files to etc directory
      ansible.builtin.copy:
        src: "/tmp/pg_init/{{ item }}"
        dest: "/etc/postgresql/{{ postgresql_version }}/main/{{ item }}"
        remote_src: yes
        owner: postgres
        group: postgres
        mode: '0640'
      loop:
        - postgresql.conf
        - pg_hba.conf
        - pg_ident.conf

    - name: Ensure correct data_directory in postgresql.conf
      ansible.builtin.lineinfile:
        path: "/etc/postgresql/{{ postgresql_version }}/main/postgresql.conf"
        regexp: "^#?data_directory\\s*="
        line: "data_directory = '/var/lib/postgresql/{{ postgresql_version }}/main'"

    - name: Configure unix_socket_directories in postgresql.conf
      ansible.builtin.lineinfile:
        path: "/etc/postgresql/{{ postgresql_version }}/main/postgresql.conf"
        regexp: "^#?unix_socket_directories\\s*="
        line: "unix_socket_directories = '/var/run/postgresql'"

    - name: Create start.conf for postgresql-common
      ansible.builtin.copy:
        dest: "/etc/postgresql/{{ postgresql_version }}/main/start.conf"
        content: "auto\n"
        owner: postgres
        group: postgres
        mode: '0644'

    - name: Clean up temporary init directory
      ansible.builtin.file:
        path: /tmp/pg_init
        state: absent
  when: not pg_version_stat.stat.exists or not pg_config_stat.stat.exists
