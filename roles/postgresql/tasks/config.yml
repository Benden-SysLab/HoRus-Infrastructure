---
- name: Deploy postgresql.conf from Ansible template
  ansible.builtin.template:
    src: postgresql.conf.j2
    dest: "/etc/postgresql/{{ postgresql_version }}/main/postgresql.conf"
    owner: postgres
    group: postgres
    mode: '0640'

- name: Deploy pg_hba.conf from Ansible template
  ansible.builtin.template:
    src: pg_hba.conf.j2
    dest: "/etc/postgresql/{{ postgresql_version }}/main/pg_hba.conf"
    owner: postgres
    group: postgres
    mode: '0640'

- name: Create start.conf for postgresql-common
  ansible.builtin.copy:
    dest: "/etc/postgresql/{{ postgresql_version }}/main/start.conf"
    content: "auto\n"
    owner: postgres
    group: postgres
    mode: '0644'
