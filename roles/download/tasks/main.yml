---
# roles/download/tasks/main.yml
- name: "Download file: {{ download_url }}"
  ansible.builtin.get_url:
    url: "{{ download_url }}"
    dest: "{{ download_dest }}"
    checksum: "{{ download_checksum | default(omit) }}"
    mode: "{{ download_mode | default('0644') }}"
    owner: "{{ download_owner | default('root') }}"
    group: "{{ download_group | default('root') }}"
    force: "{{ download_force | default(false) }}"
    timeout: "{{ download_timeout | default(30) }}"
    validate_certs: "{{ download_validate_certs | default(true) }}"
  register: _download_result
  until: _download_result is succeeded
  retries: "{{ download_retries | default(3) }}"
  delay: "{{ download_delay | default(5) }}"
  environment:
    http_proxy: "{{ http_proxy | default((proxy_env.http_proxy | default('') != '') | ternary(proxy_env.http_proxy, omit)) }}"
    https_proxy: "{{ https_proxy | default((proxy_env.https_proxy | default('') != '') | ternary(proxy_env.https_proxy, omit)) }}"
    no_proxy: "{{ no_proxy | default((proxy_env.no_proxy | default('') != '') | ternary(proxy_env.no_proxy, omit)) }}"
